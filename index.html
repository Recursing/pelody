const L={w:0,h:0,dpr:1,laneX:[0,0,0],laneW:0,padY:0,top:0};
function layout(){

/* ---------------- audio + the one clock ----------------
   worldTime = "heard time": the context time of the audio currently
   reaching the listener (a source started at ctx time T is heard when
   worldTime==T, so scheduling for world t means source.start(t)).
   Derived as currentTime − lat, where lat is a SLEW-LIMITED output-latency
   model (≤0.3ms/frame toward the live getOutputTimestamp measurement;
   fallback outputLatency/baseLatency). Raw timestamps jitter and wander on
   some audio stacks — trusting them per-frame moved balls/judging against
   the scheduled notes. Anchoring to currentTime (the SAME hardware clock
   every note is scheduled on) makes balls-vs-audio error bounded and
   non-accumulating; latency-model error only shifts visuals by a few
   near-constant ms. ?av=ms shifts visuals/judging vs audio; ?input=ms
   shifts inputs. */
const Q=new URLSearchParams(location.search);
const AV_OFF=(+Q.get('av')||0)/1000, IN_OFF=(+Q.get('input')||0)/1000;
const AU={ctx:null,master:null,mel:null,delay:null,
  init(){
    if(this.ctx){if(this.ctx.state==='suspended')this.ctx.resume();return;} // iOS interruption recovery
    const C=this.ctx=new (window.AudioContext||window.webkitAudioContext)({latencyHint:'interactive'});
    const comp=C.createDynamicsCompressor();              // master limiter
    comp.threshold.value=-14;comp.knee.value=24;comp.ratio.value=14;
    comp.attack.value=.002;comp.release.value=.12;
    comp.connect(C.destination); this.master=comp;
    this.mel=C.createGain(); this.mel.gain.value=.9; this.mel.connect(comp);
    const d=C.createDelay(1),fb=C.createGain(),wet=C.createGain();
    d.delayTime.value=.3; fb.gain.value=.32; wet.gain.value=.16;
    d.connect(fb); fb.connect(d); d.connect(wet); wet.connect(comp);
    this.delay=d; this.mel.connect(d);
  },
  // bass/ticks/ghosts route through a per-song bus so a song/mode restart
  // can cut already-scheduled backing instead of leaking it into the count-in
  newBackBus(){
    if(!this.ctx)return;
    if(this.back)this.back.disconnect();
    this.back=this.ctx.createGain(); this.back.gain.value=1.2;  // arrangement almost as loud as the melody
    this.back.connect(this.master);
  },
  noiseBuf(){
    if(this._nb)return this._nb;
    const C=this.ctx,b=C.createBuffer(1,C.sampleRate,C.sampleRate),d=b.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    return this._nb=b;
  },
  pan(node,lane){ // lane-aware stereo: binds each note to its ball's position
    if(lane===undefined||!this.ctx.createStereoPanner)return node;
    const p=this.ctx.createStereoPanner(); p.pan.value=(lane-1)*.55;
    node.connect(p); return p;
  },
  refresh(){ // once per frame: feed the slew-limited latency model
    const C=this.ctx; if(!C||C.state!=='running')return;
    let s=null;
    if(C.getOutputTimestamp){
      const ot=C.getOutputTimestamp();
      if(ot&&ot.contextTime!==undefined&&ot.contextTime>0)
        s=C.currentTime-(ot.contextTime+(performance.now()-ot.performanceTime)/1000);
    }
    if(s===null)s=C.outputLatency||C.baseLatency||0;
    if(this.lat===undefined)this.lat=s;
    else if((this._latN=(this._latN||0)+1)<60)
      this.lat+=.2*(s-this.lat);       // warmup (~1s): converge fast — the
                                       // first samples can be a stale fallback
    else this.lat+=clamp(s-this.lat,-3e-4,3e-4);           // then creep only
  },
  ctxNow(){ // currentTime interpolated between audio render quanta
    const C=this.ctx,c=C.currentTime,p=performance.now();

    const C=this.ctx,f=440*Math.pow(2,(midi-69)/12),low=midi<48;

  }

/* per-song best score/combo, persisted (localStorage can throw on file://) */
const BEST=(()=>{try{const v=JSON.parse(localStorage.getItem('pelody.best'));return v&&typeof v==='object'?v:{}}catch(e){return{}}})();
function saveBest(){try{localStorage.setItem('pelody.best',JSON.stringify(BEST))}catch(e){}}
/* natural (non-autopilot) song end: grade the run, bank bests, stage results.
   Graded against ALL notes (missed AND skipped-by-recovery both count against
   you); bests keyed per song+mode — the two ball models aren't score-comparable */
function finishSong(){
  const total=G.events.length,acc=total?G.caught/total:0;
  const key=G.song.name+'/'+G.mode,b=BEST[key],nb=G.score>0&&(!b||G.score>b.score);
  G.results={title:G.song.title,mode:G.mode,score:G.score,caught:G.caught,total,
    combo:G.bestCombo,newBest:nb,prev:b?b.score:0,
    grade:acc>=.999?'S':acc>=.95?'A':acc>=.85?'B':acc>=.7?'C':'D'};
  if(nb||G.bestCombo>(b?b.combo:0)){
    BEST[key]={score:Math.max(G.score,b?b.score:0),combo:Math.max(G.bestCombo,b?b.combo:0)};
    saveBest();
  }
}

function startSong(){
  const song=G.song=SONGS[G.songIdx];
  G.spb0=song.spb0;
  const md=song.modes[G.mode];
  G.events=md.events.map((a,i)=>({i,t:a[0],beat:a[1],lane:a[2],ball:a[3],vel:a[4],
    midis:a.slice(5),status:'pending'}));
  G.balls=md.chains.map((c,ci)=>{
    const evs=c.ev.map(i=>G.events[i]);
    const segs=[{kind:'entry',t0:c.entryT,t1:evs[0].t,lane:evs[0].lane}];
    for(let j=0;j+1<evs.length;j++)
      segs.push({kind:'throw',t0:evs[j].t,t1:evs[j+1].t,from:evs[j].lane,to:evs[j+1].lane});
    const last=evs[evs.length-1];
    segs.push({kind:'exit',t0:last.t,t1:c.exitT,lane:last.lane});
    return{id:ci,thread:c.thread,color:BALL_COLORS[c.thread%BALL_COLORS.length],
      ev:c.ev,segs,dead:false,trail:[]};

  G.score=0;G.scoreShown=0;G.scorePop=0;G.combo=0;G.bestCombo=0;G.floats.length=0;
  G.results=null;
  AU.newBackBus();                             // cut any backing scheduled by the previous song
  // 8-tick count-in; tick pace capped so very slow songs don't stall for 15s
  const cs=G.countSpb=clamp(G.spb0,.25,.6);
  G.t0=AU.world()+8*cs+.3;
  G.countTicks=[];
  for(let i=0;i<8;i++)G.countTicks.push({t:(i-8)*cs,hi:i%4===0,done:false});

/* the paddle face is a squashed elliptical arc (semi-axes A×B, used out to
   parametric angle tmax; a circle is the B=A case). Squashing multiplies
   every surface slope by B/A, so the same ±44° fan of face normals — wide
   enough that real bounce bisectors mostly resolve ON the face — needs only
   ~.30 of the half-width in bulge instead of the circle's .40, at the cost
   of a mild outward bias in where contacts land. The flattest launches
   still clamp to the rim: an edge skim is the nearest physical contact. */
function padGeom(){
  const h=L.laneW*.4,tmax=1.0996;                 // rim at 63°
  const A=h/Math.sin(tmax);
  const B=A*.9657/Math.tan(tmax);                 // tan44°/tan63° ⇒ B/A≈.49
  return{h,A,B,tmax,tc:Math.asin(.95*Math.sin(tmax)),sg:B*(1-Math.cos(tmax))};
}
/* velocity (px/s, screen coords: +y down) of a segment's drawn path at its
   start or end — mirrors the geometry in ballPos exactly */
function segV(ball,g,atEnd){
  const T=Math.max(g.t1-g.t0,1e-4),F=L.padY-L.top;
  if(g.kind==='entry'){
    if(ball.id%12===0&&T>=.5){
      const left=g.lane===0||(g.lane===1&&ball.id%2===0);
      const x0=left?-60*L.dpr:L.w+60*L.dpr;
      return{x:(L.laneX[g.lane]-x0)/T,y:2*F/T};
    }
    const A=Math.min(apexH(2*T),F*2.5);
    return{x:0,y:2*A/T};
  }
  if(g.kind==='exit')return{x:(L.w*1.3-L.laneX[g.lane])/T,y:-2*F/T};
  const A=apexH(T),vx=(L.laneX[g.to]-L.laneX[g.from])/T;
  return{x:vx,y:atEnd?4*A/T:-4*A/T};
}
/* geometrically correct bounce point: the contact where the arc's surface
   normal bisects the reversed incoming and the outgoing flight directions
   (specular reflection). Returned as an offset from (laneX, padY). */
const NOFF={x:0,y:0};
function junctionOff(ball,gPrev,gNext){
  const vi=segV(ball,gPrev,true),vo=segV(ball,gNext,false);
  const ni=Math.hypot(vi.x,vi.y),no=Math.hypot(vo.x,vo.y);
  if(!ni||!no)return NOFF;
  const nx=vo.x/no-vi.x/ni,ny=vo.y/no-vi.y/ni;
  if(!nx&&!ny||ny>=0)return NOFF;           // degenerate: bounce off the apex
  // ellipse point whose outward normal is (nx,ny): slope there = nx/(-ny),
  // parametric angle t from tan(t) = (A/B)·slope, clamped inside the rim
  const pg=padGeom(),t=clamp(Math.atan(pg.A/pg.B*nx/-ny),-pg.tc,pg.tc);
  return{x:pg.A*Math.sin(t),y:pg.B*(1-Math.cos(t))};
}
/* absolute contact point on the paddle face for a landing event */
function evContact(e){
  const b=G.balls[e.ball],ji=b.ev.indexOf(e.i);
  const o=ji>=0&&ji+1<b.segs.length?junctionOff(b,b.segs[ji],b.segs[ji+1]):NOFF;
  return{x:L.laneX[e.lane]+o.x,y:L.padY+o.y};
}
/* ball position at song-time s (null = not visible) */
function ballPos(ball,s){
  const segs=ball.segs;
  if(!segs.length||s<segs[0].t0||s>segs[segs.length-1].t1)return null;
  for(let gi=0;gi<segs.length;gi++){
    const g=segs[gi];
    if(s<g.t0||s>g.t1)continue;
    const T=g.t1-g.t0,u=T>0?(s-g.t0)/T:1;
    // arc endpoints shift to the paddle-face contact points (blended linearly
    // along the arc so the parabola shape is preserved)
    const o0=gi>0?junctionOff(ball,segs[gi-1],g):NOFF;
    const o1=gi+1<segs.length?junctionOff(ball,g,segs[gi+1]):NOFF;
    if(g.kind==='entry'){
      const x=L.laneX[g.lane]+o1.x*u,oy=o1.y*u;
      if(ball.id%12===0&&T>=.5){ // very rarely: a normal parabola in from a side
        const left=g.lane===0||(g.lane===1&&ball.id%2===0);
        const x0=left?-60*L.dpr:L.w+60*L.dpr;
        return{x:lerp(x0,x,u),y:L.padY-4*(L.padY-L.top)*.5*u*(1-u)+oy};
      }
      // entries fall from above as the DESCENDING arm of a really high throw
      // under the one gravity (virtual apex = a throw twice the entry's
      // duration, capped so there's still anticipation time on screen)
      const A=Math.min(apexH(2*T),(L.padY-L.top)*2.5),uu=.5+.5*u;
      return{x,y:L.padY-4*A*uu*(1-uu)+oy};
    }
    if(g.kind==='exit'){
      // leave "to safety" via a normal rightward parabola (~mid-screen apex),
      // fading out at the screen edge — never up and off the top
      const x=lerp(L.laneX[g.lane]+o0.x,L.w*1.3,u);
      const a=clamp((L.w+60*L.dpr-x)/(120*L.dpr),0,1);
      if(a<=0)return null;
      return{x,y:L.padY-4*(L.padY-L.top)*.5*u*(1-u)+o0.y*(1-u),a};
    }
    // throw: true parabola under the one gravity — always. VERY high throws
    // simply sail off the top and fall back down; the ball is the SAME ball
    // (its trail streams back in with it), never faded out and respawned.
    const x=lerp(L.laneX[g.from]+o0.x,L.laneX[g.to]+o1.x,u);
    return{x,y:L.padY-4*apexH(T)*u*(1-u)+o0.y*(1-u)+o1.y*u};
  }
  return null;
}
// ONE gravity for every ball: apex = (g/8)T², pure physics of airtime — same
// throw duration = same height for all balls, always (full screen height at
// T≈2.1s). Tiny hops keep a small visibility floor.
const apexH=(T,d)=>Math.max((L.padY-L.top)*.85*T*T/4,9*L.dpr);

/* miss recovery: replacement pel targets the chain's next event with
   >= 2 beats of lead; nearer events are skipped (their notes stay silent) */
function recover(ball,sNow){
  const lead=2*G.spb0;
  const evs=ball.ev.map(i=>G.events[i]).filter(e=>e.status==='pending');
  let target=null;
  for(const e of evs){
    if(e.t>=sNow+lead){target=e;break;}
    e.status='skipped';
  }
  if(!target){ball.dead=true;return;}
  const rest=ball.ev.map(i=>G.events[i]).filter(e=>e.t>=target.t);
  ball.segs=[{kind:'entry',t0:target.t-lead,t1:target.t,lane:target.lane}];
  for(let j=0;j+1<rest.length;j++)
    ball.segs.push({kind:'throw',t0:rest[j].t,t1:rest[j+1].t,from:rest[j].lane,to:rest[j+1].lane});
  const last=rest[rest.length-1];
  ball.segs.push({kind:'exit',t0:last.t,t1:last.t+2*G.spb0,lane:last.lane});
  ball.trail=[];
}

/* ---------------- judging state machine ----------------
   commit at t-30ms if paddle occupies lane -> note EXACTLY on beat (no
   cancel); else late window +60ms -> soft immediate attack; else miss. */
const COMMIT=.03,LATE=.06;
function judge(now){
  const s=now-G.t0;
  for(let i=G.judged;i<G.events.length;i++){
    const e=G.events[i],t=G.t0+e.t;
    if(t-now>COMMIT+.25)break;                    // beyond horizon
    if(e.status==='committed'){
      if(now>=t){e.status='caught';G.caught++;catchFx(e);}
      continue;
    }
    if(e.status!=='pending')continue;
    if(now>=t-COMMIT){
      // jank cap: a stalled frame may straddle the whole window — accept the
      // catch up to +250ms (zen-generous), beyond that it's a miss
      if(G.paddle.lane===e.lane&&now<=t+.25){
        e.status='committed';
        AU.pluck(e.midis,AU.toCtx(Math.max(t,now+.005)),e.vel,now>t+LATE,e.lane);
        if(now>=t){e.status='caught';G.caught++;catchFx(e);}  // slow frame straddled t
      }else if(now>t+LATE){
        e.status='missed';G.missed++;
        if(!G.auto&&G.combo>=8)
          G.floats.push({x:L.laneX[e.lane],y:L.padY-30*L.dpr,txt:'COMBO BREAK',t:1.3,c:'#ff6a6a'});
        G.combo=0;
        AU.thud(AU.toCtx(now+.005),e.lane);
        G.laneFlash[e.lane]=-1;
        if(navigator.vibrate)navigator.vibrate(60);
        recover(G.balls[e.ball],s);
      }
    }
  }
  while(G.judged<G.events.length&&G.events[G.judged].status!=='pending'
        &&G.events[G.judged].status!=='committed')G.judged++;
}
function lateCatch(lane,tsWorld){
  for(let i=G.judged;i<G.events.length;i++){
    const e=G.events[i];if(e.status!=='pending')continue;
    const t=G.t0+e.t;
    if(e.lane===lane&&tsWorld>t-COMMIT&&tsWorld<=t+LATE){
      e.status='caught';G.caught++;
      // early press inside the commit window: schedule ON the beat, full
      // strength; genuinely late: soft attack now (bounded flam)
      const late=AU.world()>t;
      AU.pluck(e.midis,AU.toCtx(Math.max(t,AU.world()+.005)),e.vel,late,e.lane);
      catchFx(e,late);return true;
    }
    if(t-tsWorld>LATE)break;
  }
  return false;
}
/* attract-mode autopilot (P): the paddle plays perfectly — sit on the lane of
   the earliest unresolved event; once it commits (t-30ms) move to the next.
   Pure spectator tool for judging choreography feel; any manual input takes over. */
function autopilot(){
  for(let i=G.judged;i<G.events.length;i++){
    const e=G.events[i];
    if(e.status==='pending'){G.paddle.lane=e.lane;break;}
  }
}
const multOf=combo=>1+Math.min(7,Math.floor(combo/8));   // ×2 at 8, ×3 at 16 ... ×8 cap
/* base points reflect the difficulty of the individual catch: hang-time of the
   landing throw (in beats, capped at 4) plus lanes crossed (0/1/2). Typical
   catch lands near ~100; deterministic, integer. Chords pay per-event. */
function basePts(e){
  let air=2*G.spb0,dist=1;                       // fallback if seg lookup fails
  for(const s of G.balls[e.ball].segs)
    if(s.t1===e.t){air=s.t1-s.t0;dist=s.kind==='throw'?Math.abs(s.to-s.from):0;break;}
  return 70+Math.round(Math.min(air/G.spb0,4)*9)+dist*14;
}
function catchFx(e,late){
  if(!G.auto){ // score only human play; PERFECT (on-beat commit) beats a late save
    G.combo++;G.bestCombo=Math.max(G.bestCombo,G.combo);
    const base=basePts(e),mult=multOf(G.combo),pts=(late?Math.round(base*.6):base)*mult;
    G.score+=pts;G.scorePop=1;
    G.floats.push({x:L.laneX[e.lane],y:L.padY-26*L.dpr,txt:'+'+pts,t:1,
                   c:late?'#9fb4d8':'#ffd166'});
    if(G.combo%8===0)
      G.floats.push({x:L.laneX[e.lane],y:L.padY-46*L.dpr,txt:'COMBO ×'+mult,t:1.5,c:'#53e0ff'});
  }
  G.paddle.flash=1;G.paddle.squash=1;G.laneFlash[e.lane]=1;
  if(navigator.vibrate)navigator.vibrate(12);
  const cp=evContact(e),c=G.balls[e.ball].color;
  for(let i=0;i<10;i++){
    const a=Math.random()*TAU,sp=(1+Math.random()*3)*L.dpr;
    G.fx.push({x:cp.x,y:cp.y,vx:Math.cos(a)*sp,vy:-Math.abs(Math.sin(a))*sp*1.6,t:1,c});

/* ---------------- input (timestamped) ---------------- */
function setLane(lane,ts){
  G.auto=false;                                  // any manual input takes over
  const w=AU.fromPerf(ts);
  if(G.diag)G.inputLat.push(Math.round((AU.world()-w)*1000));
  if(G.inputLat.length>40)G.inputLat.shift();
  G.paddle.lane=lane;
  if(G.state==='play')lateCatch(lane,w);
}
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(['arrowleft','arrowright','arrowup','arrowdown',' '].includes(k))e.preventDefault();
  if(e.repeat)return;
  // pause rides the exact tab-hide path: suspend the ctx and the shared clock
  // freezes the whole world — no separate pause mechanism to drift against it
  if(G.state==='play'&&AU.ctx&&(k==='escape'||k===' ')){
    G.paused=!G.paused;
    if(G.paused)AU.ctx.suspend();else AU.ctx.resume();
    return;
  }
  if(G.paused){                       // gate other keys BEFORE AU.init(): its
    if(k==='r'){G.paused=false;AU.ctx.resume();startSong();}          // iOS-recovery
    else if(k==='n'){G.paused=false;AU.ctx.resume();G.state='title';} // resume would
    return;                                                           // silently unpause
  }
  AU.init();
  if(G.state==='title'){
    if(k==='enter'||k===' '){startSong();return;}
    if(k==='arrowup'){G.songIdx=(G.songIdx+SONGS.length-1)%SONGS.length;return;}
    if(k==='arrowdown'){G.songIdx=(G.songIdx+1)%SONGS.length;return;}
  }
  if(k==='a')setLane(0,e.timeStamp);
  else if(k==='s'||k==='arrowdown'||k==='arrowup')setLane(1,e.timeStamp);
  else if(k==='d')setLane(2,e.timeStamp);
  else if(k==='arrowleft')setLane(Math.max(0,G.paddle.lane-1),e.timeStamp);
  else if(k==='arrowright')setLane(Math.min(2,G.paddle.lane+1),e.timeStamp);
  else if(k==='g')G.diag=!G.diag;
  else if(k==='b'){G.mode=G.mode==='juggle'?'stream':'juggle';if(G.state==='play')startSong();}
  else if(k==='n'){G.songIdx=(G.songIdx+1)%SONGS.length;if(G.state==='play')startSong();}
  else if(k==='r'){if(G.state==='play')startSong();}
  else if(k==='p'){G.auto=!G.auto;if(G.auto&&G.state==='title')startSong();}
});
cv.addEventListener('pointerdown',e=>{
  e.preventDefault();
  if(G.paused){G.paused=false;AU.ctx.resume();return;}   // tap = resume
  AU.init();
  if(G.state==='title'){
    unlockiOS();
    const y=e.clientY*(L.h/cv.clientHeight);              // menu hit-test
    const i=Math.floor((y-MENU.y0)/MENU.rh);
    if(MENU.rh&&i>=0&&i<SONGS.length)G.songIdx=i;
    startSong();return;
  }
  const frac=e.clientX/cv.clientWidth;
  setLane(frac<1/3?0:frac<2/3?1:2,e.timeStamp);
},{passive:false});
/* iOS mute-switch reroute: loop a silent <audio> so Web Audio joins the
   media channel. iOS-only, and the wav must contain real samples — a
   zero-length data chunk on loop can spin the media thread. */
let iosEl=null;
function unlockiOS(){
  if(iosEl||!/iPhone|iPad|iPod/.test(navigator.userAgent||''))return;
  const rate=8000,n=rate/4,buf=new Uint8Array(44+n);       // 0.25 s of 8-bit silence
  const hdr='RIFF....WAVEfmt \x10\0\0\0\x01\0\x01\0@\x1f\0\0@\x1f\0\0\x01\0\x08\0data';
  for(let i=0;i<hdr.length;i++)buf[i]=hdr.charCodeAt(i);
  new DataView(buf.buffer).setUint32(4,36+n,true);
  new DataView(buf.buffer).setUint32(40,n,true);
  buf.fill(128,44);
  iosEl=document.createElement('audio');
  iosEl.loop=true;iosEl.volume=.01;
  iosEl.src=URL.createObjectURL(new Blob([buf],{type:'audio/wav'}));
  iosEl.play().catch(()=>{});
}
document.addEventListener('visibilitychange',()=>{
  if(!AU.ctx)return;
  if(document.hidden)AU.ctx.suspend();          // freezes the shared clock: whole world pauses
  else if(!G.paused)AU.ctx.resume();            // don't undo an explicit user pause
});

/* ---------------- baked glow sprites (never shadowBlur in the loop) ---------------- */
const glowCache={};
function glow(color,r){
  const key=color+r;
  if(glowCache[key])return glowCache[key];
  const c=document.createElement('canvas');c.width=c.height=r*4;
  const g=c.getContext('2d'),grd=g.createRadialGradient(r*2,r*2,0,r*2,r*2,r*2);
  grd.addColorStop(0,color);grd.addColorStop(.35,color+'88');grd.addColorStop(1,color+'00');
  g.fillStyle=grd;g.fillRect(0,0,r*4,r*4);
  return glowCache[key]=c;
}

/* ---------------- backing scheduler (rolling prebake) ----------------
   All backing audio is scheduled 20s AHEAD directly on the audio-hardware
   clock (prebaked in a rolling window, refilled from the render loop): once
   scheduled, its timing can't drift no matter what the main thread does.
   Balls follow world(), refreshed each frame from getOutputTimestamp — the
   error is bounded by one frame and cannot accumulate. */
function scheduleBacking(){
  if(!AU.ctx||G.state!=='play'||document.hidden||AU.ctx.state!=='running')return;
  const now=AU.world(),horizon=now+20;
  for(const t of G.countTicks){
    const w=G.t0+t.t;
    if(!t.done&&w<horizon){t.done=true;AU.tick(AU.toCtx(w),t.hi);}
  }
  // the full arrangement (every non-melody note of the MIDI), same clock -> always in sync
  const back=G.song.back||[];
  while(G.backIdx<back.length){
    const n=back[G.backIdx],w=G.t0+n[0];
    if(w>=horizon)break;
    AU.note(n[1],AU.toCtx(w),n[2],n[3]);
    G.backIdx++;
  }
  const pc=G.song.perc||[];
  while(G.percIdx<pc.length){
    const p=pc[G.percIdx],w=G.t0+p[0];
    if(w>=horizon)break;
    AU.perc(p[1],AU.toCtx(w));
    G.percIdx++;
  }
  // ghosts: melody notes too fast to catch, auto-played softly (no ball)
  const gh=G.song.ghosts||[];
  while(G.ghostIdx<gh.length){
    const g=gh[G.ghostIdx],w=G.t0+g[0];
    if(w>=horizon)break;
    AU.pluck(g.slice(2),AU.toCtx(w),g[1]*.5,true,1);
    G.ghostIdx++;
  }
}

/* ---------------- render ---------------- */
function render(now){
  const w=L.w,h=L.h,s=now-G.t0;
  ctx.fillStyle='#05060c';ctx.fillRect(0,0,w,h);
  // beat pulse from the compiled beat grid
  let pulse=0;
  if(G.state==='play'&&G.song){
    const bts=G.song.beats;
    while(G.beatIdx+1<bts.length&&bts[G.beatIdx+1]<=s)G.beatIdx++;
    if(s>=bts[0]){
      const b0=bts[G.beatIdx],b1=bts[Math.min(G.beatIdx+1,bts.length-1)];
      pulse=Math.max(0,1-(b1>b0?(s-b0)/(b1-b0):1)*2.5);
    }
  }
  for(let i=0;i<3;i++){
    const x=L.laneX[i],f=G.laneFlash[i];
    ctx.fillStyle=f>0?`rgba(110,255,160,${f*.10})`:f<0?`rgba(255,70,70,${-f*.14})`:`rgba(120,140,255,${.025+pulse*.02})`;
    ctx.fillRect(x-L.laneW*.46,0,L.laneW*.92,h);
    G.laneFlash[i]*=Math.pow(.92,G.dt*60);if(Math.abs(G.laneFlash[i])<.02)G.laneFlash[i]=0;
  }
  ctx.fillStyle=`rgba(140,160,255,${.12+pulse*.25})`;
  ctx.fillRect(0,L.padY+14*L.dpr,w,2*L.dpr);
  if(G.state==='title'){drawTitle();return;}

  // landing markers: next actionable = bright ring; rest dim
  let actionable=null;
  const lookahead=Math.min(4*G.spb0,3);
  for(let i=G.judged;i<G.events.length;i++){
    const e=G.events[i];
    if(e.status!=='pending'&&e.status!=='committed')continue;
    if(e.t<s-.1)continue;
    if(e.t>s+lookahead)break;
    const isNext=!actionable;(actionable??=e);
    const cp=evContact(e),rem=(e.t-s)/G.spb0,c=G.balls[e.ball].color;
    const r=(8+Math.min(rem,4)*14)*L.dpr;
    // rings brighten gradually as their landing nears (ball's own color,
    // ease-in so they stay dim most of the approach), with a hard jump in
    // brightness the moment one is promoted to THE next actionable note
    const prox=clamp(1-(e.t-s)/lookahead,0,1);
    ctx.strokeStyle=c;
    ctx.globalAlpha=isNext?.95:.1+.3*prox*prox;ctx.lineWidth=(isNext?2.4:(1+.5*prox))*L.dpr;
    ctx.beginPath();ctx.arc(cp.x,cp.y,Math.max(4*L.dpr,r),0,TAU);ctx.stroke();
    ctx.globalAlpha=1;
  }

  for(const b of G.balls){
    if(b.dead)continue;
    const p=ballPos(b,s);
    if(!p){b.trail.length=0;continue;}
    const trailLife=.45; // seconds: fade duration is independent of ball speed/frame rate
    if(!b.tLast||now-b.tLast>=.012){b.trail.push({x:p.x,y:p.y,t:now});b.tLast=now;}
    while(b.trail.length&&now-b.trail[0].t>trailLife)b.trail.shift();
    ctx.globalCompositeOperation='lighter';
    // Timestamped comet ribbon: opacity follows sample AGE, not distance along
    // the path. Fast balls therefore leave longer trails than slow balls while
    // both fade over exactly trailLife seconds. Flush caps avoid visible beads
    // or square endpoints at the individual samples.
    if(b.trail.length>1){
      ctx.lineCap='butt';ctx.lineJoin='round';
      for(let i=1;i<=b.trail.length;i++){
        const a=b.trail[i-1],z=i<b.trail.length?b.trail[i]:{x:p.x,y:p.y,t:now};
        if(Math.abs(z.x-a.x)+Math.abs(z.y-a.y)<.01)continue;
        const fa=Math.pow(clamp(1-(now-a.t)/trailLife,0,1),1.35);
        const fz=Math.pow(clamp(1-(now-z.t)/trailLife,0,1),1.35);
        const ha=Math.round(fa*255).toString(16).padStart(2,'0');
        const hz=Math.round(fz*255).toString(16).padStart(2,'0');
        const fade=ctx.createLinearGradient(a.x,a.y,z.x,z.y);
        fade.addColorStop(0,b.color+ha);fade.addColorStop(1,b.color+hz);
        ctx.strokeStyle=fade;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(z.x,z.y);
        ctx.globalAlpha=.28*(p.a??1);ctx.lineWidth=15*L.dpr;ctx.stroke();
        ctx.globalAlpha=.72*(p.a??1);ctx.lineWidth=6*L.dpr;ctx.stroke();
      }
    }
    const isNextBall=actionable&&G.balls[actionable.ball]===b;
    const near=isNextBall?clamp(1-(actionable.t-s)/G.spb0,0,1):0;
    ctx.globalAlpha=(isNextBall?1:.62)*(p.a??1);
    const spr=glow(b.color,10),sz=(16+near*5)*L.dpr;
    ctx.drawImage(spr,p.x-sz,p.y-sz,sz*2,sz*2);
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(p.x,p.y,(5.6+near*1.4)*L.dpr,0,TAU);ctx.fill();
    ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  }
  // particles (in-place compaction, no per-frame array allocation)
  ctx.globalCompositeOperation='lighter';
  const k60=G.dt*60;let wIdx=0;
  for(const f of G.fx){
    f.x+=f.vx*k60;f.y+=f.vy*k60;f.vy+=.15*L.dpr*k60;f.t-=1.8*G.dt;
    if(f.t<=0)continue;
    const spr=glow(f.c,6),sz=6*f.t*L.dpr;
    ctx.globalAlpha=f.t*.7;
    ctx.drawImage(spr,f.x-sz,f.y-sz,sz*2,sz*2);
    G.fx[wIdx++]=f;
  }
  G.fx.length=wIdx;
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  // floating score texts (rise + fade, in-place compaction)
  ctx.textAlign='center';ctx.font=`bold ${11*L.dpr}px ui-monospace,monospace`;
  let wf=0;
  for(const f of G.floats){
    f.t-=1.1*G.dt;f.y-=34*L.dpr*G.dt;
    if(f.t<=0)continue;
    ctx.globalAlpha=Math.min(1,f.t);ctx.fillStyle=f.c;
    ctx.fillText(f.txt,f.x,f.y);
    G.floats[wf++]=f;
  }
  G.floats.length=wf;ctx.globalAlpha=1;
  // paddle: a convex elliptical arc through (px, padY); the contact geometry
  // above rides this exact ellipse, so bounce points sit visibly ON the face
  const px=L.laneX[G.paddle.lane],pg=padGeom();
  G.paddle.flash*=Math.pow(.88,k60);G.paddle.squash*=Math.pow(.85,k60);
  const ph=(7+G.paddle.squash*5)*L.dpr;
  // neon halo hugs the face itself: restroke the same path in widening,
  // fading layers ('lighter'), so the glow radiates outward along the
  // curve's normals instead of sitting in a straight rectangular haze
  ctx.beginPath();
  ctx.ellipse(px,L.padY+pg.B,pg.A,pg.B,0,-Math.PI/2-pg.tmax,-Math.PI/2+pg.tmax);
  ctx.lineCap='round';
  ctx.globalCompositeOperation='lighter';
  ctx.strokeStyle=G.auto?'#7fe8d8':'#8fb4ff';
  const gi=.5+G.paddle.flash*.5;
  for(const[gw,ga]of[[34,.03],[24,.05],[16,.08],[10,.12],[6,.17],[3,.24]]){
    ctx.globalAlpha=gi*ga;ctx.lineWidth=ph+gw*2*L.dpr;ctx.stroke();
  }
  ctx.globalAlpha=1;ctx.globalCompositeOperation='source-over';
  ctx.strokeStyle=G.paddle.flash>.3?'#ffffff':G.auto?'#b8f0e6':'#cfe0ff';
  ctx.lineWidth=ph;ctx.stroke();
  // count-in
  if(s<0){
    ctx.fillStyle='rgba(230,240,255,.85)';ctx.font=`bold ${44*L.dpr}px ui-monospace,monospace`;
    ctx.textAlign='center';
    ctx.fillText(''+(Math.floor(-s/G.countSpb)+1),w/2,h*.4);
  }
  hud();
  if(G.diag)diag(now,s);
  if(G.paused){                                  // ctx suspended: world is frozen under this
    ctx.fillStyle='rgba(4,6,16,.62)';ctx.fillRect(0,0,w,h);
    ctx.textAlign='center';
    ctx.fillStyle='#e8ecff';ctx.font=`bold ${28*L.dpr}px ui-monospace,monospace`;
    ctx.fillText('PAUSED',w/2,h*.5);                       // below the count-in digit
    ctx.fillStyle='rgba(160,180,220,.8)';ctx.font=`${13*L.dpr}px ui-monospace,monospace`;
    ctx.fillText('Esc to resume · R restart · N menu',w/2,h*.5+28*L.dpr);
  }
  if(s>G.song.dur+1.5){                          // song over -> back to the menu
    if(G.auto){G.songIdx=(G.songIdx+1)%SONGS.length;startSong();}  // attract mode plays on
    else{finishSong();G.state='title';}
  }
}
function hud(){
  ctx.font=`${11*L.dpr}px ui-monospace,monospace`;ctx.textAlign='left';
  ctx.fillStyle='rgba(160,180,220,.55)';
  ctx.fillText(`${G.song.title} (N) · ${G.mode==='juggle'?'JUGGLE':'STREAM'} (B) · notes ${G.caught}/${G.caught+G.missed}`,12*L.dpr,20*L.dpr);
  if(G.auto){ctx.fillStyle='#8ff0e8';ctx.fillText('AUTO (P / any key to take over)',12*L.dpr,38*L.dpr);}
  // score: live rolling count-up with a pop on gain; combo chip under it
  if(!G.auto){
    G.scoreShown+=(G.score-G.scoreShown)*Math.min(1,G.dt*10);
    if(G.score-G.scoreShown<.5)G.scoreShown=G.score;
    G.scorePop*=Math.pow(.9,G.dt*60);
    ctx.textAlign='right';
    ctx.font=`bold ${(16+G.scorePop*6)*L.dpr}px ui-monospace,monospace`;
    ctx.fillStyle=G.scorePop>.5?'#ffffff':'#ffd166';
    ctx.fillText(Math.floor(G.scoreShown).toLocaleString('en'),L.w-12*L.dpr,28*L.dpr);
    if(G.combo>=2){
      const m=multOf(G.combo);
      ctx.font=`${11*L.dpr}px ui-monospace,monospace`;
      ctx.fillStyle=G.combo%8>=6?'#bff5ff':'#53e0ff';   // brighten near next tier
      ctx.fillText(`${G.combo} combo${m>1?'  ×'+m:''}`,L.w-12*L.dpr,46*L.dpr);
    }
  }
  ctx.textAlign='right';ctx.fillStyle='rgba(160,180,220,.55)';
  ctx.fillText('←→ / A S D · Esc pause · R restart · P auto · G diag',L.w-12*L.dpr,L.h-10*L.dpr);
}
function diag(now,s){
  const C=AU.ctx;
  ctx.fillStyle='rgba(5,8,18,.8)';ctx.fillRect(8*L.dpr,L.h-96*L.dpr,300*L.dpr,88*L.dpr);
  ctx.fillStyle='#9fe8b0';ctx.font=`${10*L.dpr}px ui-monospace,monospace`;ctx.textAlign='left';
  const ol=C?((C.outputLatency||C.baseLatency||0)*1000).toFixed(1):'—';
  ctx.fillText(`world ${now.toFixed(3)}  song ${s.toFixed(2)}s  OL ${ol}ms  lat ${((AU.lat||0)*1000).toFixed(1)}ms`,14*L.dpr,L.h-78*L.dpr);
  ctx.fillText(`ctx.currentTime ${C?C.currentTime.toFixed(3):'—'}  Δ ${C?((C.currentTime-now)*1000).toFixed(1):'—'}ms`,14*L.dpr,L.h-62*L.dpr);
  ctx.fillText(`inputΔms [${G.inputLat.slice(-8).join(',')}]`,14*L.dpr,L.h-46*L.dpr);
  ctx.fillText(`caught ${G.caught} missed ${G.missed} judged ${G.judged}/${G.events.length}`,14*L.dpr,L.h-30*L.dpr);
  ctx.fillText(`balls ${G.balls.filter(b=>!b.dead).length} fx ${G.fx.length} dpr ${L.dpr}`,14*L.dpr,L.h-14*L.dpr);
}
const MENU={y0:0,rh:0};
function drawTitle(){
  const w=L.w,h=L.h,r=G.results;
  ctx.textAlign='center';
  if(r){ // end-of-song results replace the header; the menu below still picks the next
    // song. Stack anchors upward from the menu so short viewports can't overlap it.
    const GC={S:'#ffd166',A:'#7be07f',B:'#53e0ff',C:'#cfe0ff',D:'#ff6a6a'},yb=h*.44;
    ctx.fillStyle='rgba(160,180,220,.8)';ctx.font=`${14*L.dpr}px ui-monospace,monospace`;
    ctx.fillText(`${r.title.toUpperCase()} · ${r.mode.toUpperCase()} — COMPLETE`,w/2,yb-158*L.dpr);
    ctx.fillStyle='#ffd166';ctx.font=`bold ${Math.min(40*L.dpr,w/10)}px ui-monospace,monospace`;
    ctx.fillText(r.score.toLocaleString('en'),w/2,yb-112*L.dpr);
    ctx.font=`bold ${16*L.dpr}px ui-monospace,monospace`;ctx.fillStyle=GC[r.grade];
    ctx.fillText('GRADE '+r.grade,w/2,yb-84*L.dpr);
    if(r.newBest){
      if(Math.floor(performance.now()/500)%2){
        ctx.fillStyle='#7be07f';ctx.font=`bold ${14*L.dpr}px ui-monospace,monospace`;
        ctx.fillText('★ NEW BEST ★',w/2,yb-58*L.dpr);
      }
    }else if(r.prev){
      ctx.fillStyle='rgba(255,209,102,.45)';ctx.font=`${12*L.dpr}px ui-monospace,monospace`;
      ctx.fillText('best '+r.prev.toLocaleString('en'),w/2,yb-58*L.dpr);
    }
    ctx.fillStyle='rgba(160,180,220,.55)';ctx.font=`${12*L.dpr}px ui-monospace,monospace`;
    ctx.fillText(`caught ${r.caught}/${r.total} · best combo ${r.combo}`,w/2,yb-36*L.dpr);
    ctx.fillText('pick your next song',w/2,yb-14*L.dpr);
  }else{
    ctx.fillStyle='#e8ecff';ctx.font=`bold ${Math.min(64*L.dpr,w/8)}px ui-monospace,monospace`;
    ctx.fillText('PELODY',w/2,h*.26);
    ctx.fillStyle='rgba(160,180,220,.8)';ctx.font=`${14*L.dpr}px ui-monospace,monospace`;
    ctx.fillText('the balls play the song — catch them on the beat',w/2,h*.26+34*L.dpr);
    ctx.fillStyle='rgba(232,236,255,.8)';ctx.font=`${12*L.dpr}px ui-monospace,monospace`;
    ctx.fillText('be under the bright ring when a ball lands — misses just mute a note',w/2,h*.26+58*L.dpr);
    ctx.fillStyle='rgba(160,180,220,.55)';
    ctx.fillText('←→ step · A S D jump to lane · tap thirds on mobile',w/2,h*.26+76*L.dpr);
    ctx.fillText('B ball model · P autopilot · G diagnostics · Esc pause · R restart',w/2,h*.26+94*L.dpr);
  }
  // song menu (↑↓ or tap a row)
  MENU.rh=30*L.dpr;MENU.y0=h*.44;
  ctx.font=`${15*L.dpr}px ui-monospace,monospace`;
  for(let i=0;i<SONGS.length;i++){
    const sel=i===G.songIdx,y=MENU.y0+MENU.rh*(i+.7),s=SONGS[i];
    const label=`${s.title}  ${Math.floor(s.dur/60)}:${(''+Math.floor(s.dur%60)).padStart(2,'0')}`;
    if(sel){
      ctx.fillStyle='rgba(123,224,127,.12)';
      ctx.fillRect(w/2-190*L.dpr,MENU.y0+MENU.rh*i+3*L.dpr,380*L.dpr,MENU.rh-6*L.dpr);
    }
    ctx.fillStyle=sel?'#7be07f':'rgba(160,180,220,.55)';
    ctx.fillText((sel?'▸ ':'')+label+(sel?' ◂':''),w/2,y);
    const bb=BEST[s.name+'/'+G.mode];
    if(bb&&Number.isFinite(bb.score)){ // dim personal best (current mode) at the row's right edge
      ctx.textAlign='right';ctx.font=`${11*L.dpr}px ui-monospace,monospace`;
      ctx.fillStyle='rgba(255,209,102,.4)';
      ctx.fillText('best '+bb.score.toLocaleString('en'),Math.min(w/2+184*L.dpr,w-8*L.dpr),y);
      ctx.textAlign='center';ctx.font=`${15*L.dpr}px ui-monospace,monospace`;
    }
  }
  ctx.fillStyle='#7be07f';ctx.font=`bold ${18*L.dpr}px ui-monospace,monospace`;
  if(Math.floor(performance.now()/600)%2)
    ctx.fillText('TAP / ENTER TO PLAY',w/2,MENU.y0+MENU.rh*SONGS.length+34*L.dpr);
  for(let i=0;i<3;i++){
    const t=performance.now()/1000+i*.66,x=L.laneX[i],y=h*.78-Math.abs(Math.sin(t*2.2))*h*.06;
    ctx.globalCompositeOperation='lighter';
    const spr=glow(BALL_COLORS[i],10),sz=12*L.dpr;
    ctx.drawImage(spr,x-sz,y-sz,sz*2,sz*2);
    ctx.globalCompositeOperation='source-over';
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(x,y,4*L.dpr,0,TAU);ctx.fill();
  }
}

/* ---------------- main loop ---------------- */
let lastTs=0;
function frame(ts){
  requestAnimationFrame(frame);
  G.dt=clamp((ts-lastTs)/1000||.016,.001,.05); lastTs=ts;   // frame-rate-independent decays
  AU.refresh();
  // freeze the world while the audio is frozen (tab hide, iOS interruption):
  // balls, judging and scheduling all pause WITH the music — nothing can
  // drift apart, ever
  const live=AU.ctx&&AU.ctx.state==='running';
  const now=live?AU.world():(G.lastNow||0);
  G.lastNow=now;
  if(G.state==='play'&&live){if(G.auto)autopilot();judge(now);scheduleBacking();}
  render(now);
}
layout();
requestAnimationFrame(frame);
</script>
</body>
